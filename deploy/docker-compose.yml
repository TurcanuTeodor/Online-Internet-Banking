services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: banking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d banking"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]

  auth-service:
    build: ../services/auth-service
    env_file:
      - ../services/auth-service/.env.properties
    environment:
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_URL: jdbc:postgresql://postgres:5432/banking?currentSchema=auth
      APP_SERVICES_CLIENT_URL: http://client-service:8082
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"

  client-service:
    build: ../services/client-service
    env_file:
      - ../services/client-service/.env.properties
    environment:
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_URL: jdbc:postgresql://postgres:5432/banking?currentSchema=clients
      AUTH_SERVICE_URL: http://auth-service:8081
      ACCOUNT_SERVICE_URL: http://account-service:8083
      TRANSACTION_SERVICE_URL: http://transaction-service:8084
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8082:8082"

  account-service:
    build: ../services/account-service
    env_file:
      - ../services/account-service/.env.properties
    environment:
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_URL: jdbc:postgresql://postgres:5432/banking?currentSchema=accounts
      TRANSACTION_SERVICE_URL: http://transaction-service:8084
      FRAUD_SERVICE_URL: http://fraud-service:8086
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"

  transaction-service:
    build: ../services/transaction-service
    env_file:
      - ../services/transaction-service/.env.properties
    environment:
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_URL: jdbc:postgresql://postgres:5432/banking?currentSchema=transactions
      ACCOUNT_SERVICE_URL: http://account-service:8083
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8084:8084"

  payment-service:
    build: ../services/payment-service
    env_file:
      - ../services/payment-service/.env.properties
    environment:
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_URL: jdbc:postgresql://postgres:5432/banking?currentSchema=payments
      ACCOUNT_SERVICE_URL: http://account-service:8083
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8085:8085"

  fraud-service:
    build: ../services/fraud-service
    env_file:
      - ../services/fraud-service/.env.properties
    environment:
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_URL: jdbc:postgresql://postgres:5432/banking?currentSchema=fraud
      TRANSACTION_SERVICE_URL: http://transaction-service:8084
      ACCOUNT_SERVICE_URL: http://account-service:8083
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8086"

  api-gateway:
    build: ../services/api-gateway
    env_file:
      - ../services/api-gateway/.env.properties
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      CLIENT_SERVICE_URL: http://client-service:8082
      ACCOUNT_SERVICE_URL: http://account-service:8083
      TRANSACTION_SERVICE_URL: http://transaction-service:8084
      PAYMENT_SERVICE_URL: http://payment-service:8085
      FRAUD_SERVICE_URL: http://fraud-service:8086
    depends_on:
      auth-service:
        condition: service_started
      client-service:
        condition: service_started
      account-service:
        condition: service_started
      transaction-service:
        condition: service_started
      payment-service:
        condition: service_started
      fraud-service:
        condition: service_started

  frontend:
    build:
      context: ../frontend
    depends_on:
      api-gateway:
        condition: service_started
