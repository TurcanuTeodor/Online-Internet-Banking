# Local-only fraud-service environment template.
# Copy to .env.properties in the same folder and fill real values.

DB_URL=jdbc:postgresql://localhost:5432/banking?currentSchema=fraud
DB_USERNAME=postgres
# DB_PASSWORD is injected by docker compose from root .env (POSTGRES_PASSWORD)
JWT_SECRET=replace-me-jwt-secret
INTERNAL_API_SECRET=replace-me-internal-secret

# LLM settings
LLM_PROVIDER=groq
GEMINI_API_KEY=
GROQ_API_KEY=replace-me-groq-api-key
