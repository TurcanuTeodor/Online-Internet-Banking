spring.config.import=optional:file:.env.properties

# ==================== SERVICE IDENTITY ====================
spring.application.name=fraud-service
server.port=8086

# ==================== DATABASE ====================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================== JPA / HIBERNATE ====================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.default_schema=fraud

# ==================== FLYWAY ====================
spring.flyway.enabled=true
spring.flyway.schemas=fraud
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ==================== LOGGING ====================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==================== JWT (validate-only) ====================
app.jwt.secret=${JWT_SECRET}

# ==================== INTER-SERVICE ====================
app.services.transaction.url=${TRANSACTION_SERVICE_URL:http://localhost:8084}
app.services.account.url=${ACCOUNT_SERVICE_URL:http://localhost:8083}
app.internal.api-secret=${INTERNAL_API_SECRET:change-me-internal-secret}

#===================ML ENGINE (TIER3)=====================
# MLOps Kill Switch care permite decuplarea instantanee a modelului de Machine Learning: false = Tier3 dezactivat, Tier2 decide final
# Override Docker: FRAUD_TIER3_ML_ENABLED=false

# ==================== FRAUD PROPERTIES (@ConfigurationProperties) ====================
# Tier 1 Rule Engine thresholds
fraud.tier1.large-amount-threshold=10000.0
fraud.tier1.new-account-age-days=30
fraud.tier1.burst-limit=5
fraud.tier1.burst-window-seconds=60

# Tier 2 Behavioral Scoring thresholds
fraud.tier2.lower-threshold=30.0
fraud.tier2.upper-threshold=70.0
fraud.tier2.timeout-ms=500

# Tier 3 ML Model configuration
fraud.tier3.ml-enabled=true
fraud.tier3.ml-contamination=0.05
fraud.tier3.ml-seed=42
fraud.tier3.ml-threshold=0.62
fraud.tier3.ml-training-samples=1000
fraud.tier3.timeout-ms=5000
fraud.tier3.thread-pool-size=2

# Legacy keys retained for existing Tier3MlService @Value/@ConditionalOnProperty wiring
fraud.tier3.ml.enabled=true
fraud.tier3.ml.contamination=0.05
fraud.tier3.ml.seed=42
fraud.tier3.ml.threshold=0.62
fraud.tier3.ml.training-samples=1000

# Inter-service URLs and secrets
fraud.jwt.secret=${JWT_SECRET}
fraud.services.internal-api-secret=${INTERNAL_API_SECRET:change-me-internal-secret}
fraud.services.account-service-url=${ACCOUNT_SERVICE_URL:http://localhost:8083}
fraud.services.transaction-service-url=${TRANSACTION_SERVICE_URL:http://localhost:8084}

# ==================== ACTUATOR (Security) ====================
# Base path for all actuator endpoints
management.endpoints.web.base-path=/actuator
# Explicitly expose only safe and needed endpoints + custom fraud-model endpoint
management.endpoints.web.exposure.include=health,info,metrics,prometheus,fraud-model
# Hide sensitive internals from health endpoint
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.endpoint.health.probes.enabled=true
# Disable dangerous endpoints by default
management.endpoints.web.exposure.exclude=shutdown,heapdump,threaddump,dump
# Enable observations for metrics collection
management.observations.enable.all=true
