server:
  port: 8080
  ssl:
    enabled: false

spring:
  application:
    name: api-gateway
  config:
    import: optional:file:.env.properties
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

services:
  auth:
    url: ${AUTH_SERVICE_URL:http://localhost:8081}
  client:
    url: ${CLIENT_SERVICE_URL:http://localhost:8082}
  account:
    url: ${ACCOUNT_SERVICE_URL:http://localhost:8083}
  transaction:
    url: ${TRANSACTION_SERVICE_URL:http://localhost:8084}
  payment:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8085}
  fraud:
    url: ${FRAUD_SERVICE_URL:http://localhost:8086}

app:
  jwt:
    secret: ${JWT_SECRET}
    issuer: CashTactics
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  timelimiter:
    configs:
      default:
        timeout-duration: 5s

logging:
  level:
    AUDIT: INFO
    SECURITY_AUDIT: INFO
    ro.app.gateway: INFO
