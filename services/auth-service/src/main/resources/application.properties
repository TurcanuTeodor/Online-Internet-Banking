spring.config.import=optional:file:.env.properties

# ==================== SERVICE IDENTITY ====================
spring.application.name=auth-service
server.port=8081

# ==================== DATABASE ====================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================== JPA / HIBERNATE ====================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.default_schema=auth

# ==================== FLYWAY ====================
spring.flyway.enabled=true
spring.flyway.schemas=auth
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ==================== LOGGING ====================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==================== JWT ====================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES}
app.jwt.temp-expiration-minutes=${JWT_TEMP_EXPIRATION_MINUTES}
app.jwt.issuer=${JWT_ISSUER}
app.jwt.refresh-token-days=${JWT_REFRESH_TOKEN_DAYS}

# ==================== AUTH PROPERTIES (@ConfigurationProperties) ====================
# JWT configuration (auth-service)
app.auth.jwt.secret=${JWT_SECRET}
app.auth.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}
app.auth.jwt.temp-expiration-minutes=${JWT_TEMP_EXPIRATION_MINUTES:15}
app.auth.jwt.issuer=${JWT_ISSUER:online-banking-app}
app.auth.jwt.refresh-token-days=${JWT_REFRESH_TOKEN_DAYS:7}

# Redis configuration (for JWT blacklist and session cache)
app.auth.redis.host=${REDIS_HOST:localhost}
app.auth.redis.port=${REDIS_PORT:6379}
app.auth.redis.password=${REDIS_PASSWORD:}
app.auth.redis.database=1
app.auth.redis.timeout-ms=5000

# Rate limiting configuration
app.auth.rate-limit.max-login-attempts=5
app.auth.rate-limit.window-seconds=300
app.auth.rate-limit.lockout-minutes=15

# Inter-service URLs and secrets
app.auth.services.internal-api-secret=${INTERNAL_API_SECRET:change-me-internal-secret}
app.auth.services.client-service-url=${CLIENT_SERVICE_URL:http://localhost:8082}

# ==================== 2FA ====================
app.2fa.app-name=${TOTP_APP_NAME}

# ==================== INTERNAL (client-service GDPR erasure) ====================
app.internal.api-secret=${INTERNAL_API_SECRET:change-me-internal-secret}

# Same value as client-service ENCRYPTION_KEY — used to re-encrypt sign-up data to user-derived keys
encryption.legacy-key=${ENCRYPTION_KEY:}

# ==================== ACTUATOR (Security) ====================
# Base path for all actuator endpoints
management.endpoints.web.base-path=/actuator
# Explicitly expose only safe and needed endpoints (health, info are public)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
# Hide sensitive internals from health endpoint
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.endpoint.health.probes.enabled=true
# Disable dangerous endpoints by default
management.endpoints.web.exposure.exclude=shutdown,heapdump,threaddump,dump
# Enable observations for metrics collection
management.observations.enable.all=true
