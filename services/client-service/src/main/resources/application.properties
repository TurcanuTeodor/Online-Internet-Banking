spring.config.import=optional:file:.env.properties

# ==================== SERVICE IDENTITY ====================
spring.application.name=client-service
server.port=8082

# ==================== DATABASE ====================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================== JPA / HIBERNATE ====================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.default_schema=clients

# ==================== FLYWAY ====================
spring.flyway.enabled=true
spring.flyway.schemas=clients
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ==================== LOGGING ====================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==================== JWT (validate-only) ====================
app.jwt.secret=${JWT_SECRET}
encryption.key=${ENCRYPTION_KEY}

# ==================== INTER-SERVICE (GDPR erasure orchestration) ====================
app.services.auth.url=${AUTH_SERVICE_URL:http://localhost:8081}
app.services.account.url=${ACCOUNT_SERVICE_URL:http://localhost:8083}
app.services.transaction.url=${TRANSACTION_SERVICE_URL:http://localhost:8084}
# Must match auth-service, account-service, transaction-service, payment-service
app.internal.api-secret=${INTERNAL_API_SECRET:change-me-internal-secret}

# ==================== ACTUATOR ====================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
