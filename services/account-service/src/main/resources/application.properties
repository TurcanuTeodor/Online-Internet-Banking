spring.config.import=optional:file:.env.properties

# ==================== SERVICE IDENTITY ====================
spring.application.name=account-service
server.port=8083

# ==================== DATABASE ====================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================== JPA / HIBERNATE ====================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.default_schema=accounts

# ==================== FLYWAY ====================
spring.flyway.enabled=true
spring.flyway.schemas=accounts
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ==================== CACHE ====================
# We provide a custom Composite CacheManager (Caffeine + Redis) via CacheConfig

# Redis (dev docker-compose service)
spring.data.redis.host=redis
spring.data.redis.port=6379

# ==================== LOGGING ====================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==================== JWT (validate-only) ====================
app.jwt.secret=${JWT_SECRET}

# ==================== FX (ECB) ====================
app.fx.ecb-url=https://www.ecb.europa.eu/stats/eurofxref/eurofxref-daily.xml

# ==================== INTER-SERVICE URLS ====================
app.services.transaction.url=${TRANSACTION_SERVICE_URL:http://localhost:8084}
app.services.fraud.url=${FRAUD_SERVICE_URL:http://localhost:8086}

# ==================== INTERNAL (payment-service → account / transaction) ====================
# Same value must be set on payment-service and transaction-service (.env.properties)
app.internal.api-secret=${INTERNAL_API_SECRET:change-me-internal-secret}

# ==================== ACTUATOR ====================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
