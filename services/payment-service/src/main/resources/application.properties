spring.config.import=optional:file:.env.properties

# ==================== SERVICE IDENTITY ====================
spring.application.name=payment-service
server.port=8085

# ==================== DATABASE ====================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================== JPA / HIBERNATE ====================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.default_schema=payments

# ==================== FLYWAY ====================
spring.flyway.enabled=true
spring.flyway.schemas=payments
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ==================== LOGGING ====================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==================== JWT (validate-only) ====================
app.jwt.secret=${JWT_SECRET}

# ==================== STRIPE ====================
app.stripe.secret-key=${STRIPE_SECRET_KEY}
app.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}

# ==================== PAYMENT PROPERTIES (@ConfigurationProperties) ====================
# Stripe API configuration
app.payment.stripe.api-key=${STRIPE_SECRET_KEY}
app.payment.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}
app.payment.stripe.max-retries=3
app.payment.stripe.timeout-ms=10000

# Stripe webhook configuration
app.payment.webhook.path=/webhooks/stripe
app.payment.webhook.enabled-events=charge.succeeded,charge.failed,payment_intent.succeeded,payment_intent.payment_failed

# Payment processing parameters
app.payment.processing.min-amount-cents=50
app.payment.processing.max-amount-cents=99999999
app.payment.processing.processing-timeout-ms=30000

# Inter-service URLs and secrets
app.payment.services.internal-api-secret=${INTERNAL_API_SECRET:change-me-internal-secret}
app.payment.services.transaction-service-url=${TRANSACTION_SERVICE_URL:http://localhost:8084}
app.payment.services.account-service-url=${ACCOUNT_SERVICE_URL:http://localhost:8083}
app.payment.services.fraud-service-url=${FRAUD_SERVICE_URL:http://localhost:8086}

# ==================== INTER-SERVICE (account lookup for top-up) ====================
app.services.account.url=${ACCOUNT_SERVICE_URL:http://localhost:8083}

# ==================== INTERNAL (webhook → account credit) ====================
# Must match account-service and transaction-service (.env.properties)
app.internal.api-secret=${INTERNAL_API_SECRET:change-me-internal-secret}

# ==================== ACTUATOR (Security) ====================
# Base path for all actuator endpoints
management.endpoints.web.base-path=/actuator
# Explicitly expose only safe and needed endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
# Hide sensitive internals from health endpoint
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.endpoint.health.probes.enabled=true
# Disable dangerous endpoints by default
management.endpoints.web.exposure.exclude=shutdown,heapdump,threaddump,dump
# Enable observations for metrics collection
management.observations.enable.all=true
