spring.config.import=optional:file:.env.properties

# ==================== SERVICE IDENTITY ====================
spring.application.name=payment-service
server.port=8085

# ==================== DATABASE ====================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================== JPA / HIBERNATE ====================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.default_schema=payments

# ==================== FLYWAY ====================
spring.flyway.enabled=true
spring.flyway.schemas=payments
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ==================== LOGGING ====================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==================== JWT (validate-only) ====================
app.jwt.secret=${JWT_SECRET}

# ==================== STRIPE ====================
app.stripe.secret-key=${STRIPE_SECRET_KEY}
app.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}

# ==================== INTER-SERVICE (account lookup for top-up) ====================
app.services.account.url=http://localhost:8083

# ==================== INTERNAL (webhook → account credit) ====================
# Must match account-service and transaction-service (.env.properties)
app.internal.api-secret=${INTERNAL_API_SECRET:change-me-internal-secret}

# ==================== ACTUATOR ====================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
